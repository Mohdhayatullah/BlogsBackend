<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;"><table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:20px;">    <tr>        <td align="center">            <!-- Card -->            <table width="600" cellpadding="0" cellspacing="0"                   style="background:#ffffff; border-radius:10px; overflow:hidden;">                <!-- Header -->                <tr>                    <td style="background:#2e7d32; color:#ffffff; padding:20px; text-align:center;">                        <h2 style="margin:0;">VerdantVoices 🌱</h2>                        <p style="margin:5px 0 0; font-size:13px;">Your blog is live</p>                    </td>                </tr>                <!-- Body -->                <tr>                    <td style="padding:30px; color:#333; line-height:1.6;">                        <p style="font-size:16px;">                            Hello <b th:text="${name}"></b>,                        </p>                        <p>                            Your blog has been successfully published on VerdantVoices.                        </p>                        <!-- Blog Title Box -->                        <div style="background:#f1f8f4; border-left:4px solid #2e7d32; padding:15px; margin:20px 0;">                            <p style="margin:0; font-size:14px; color:#555;">Blog Title:</p>                            <h3 style="margin:5px 0 0; color:#2e7d32;" th:text="${title}"></h3>                        </div>                        <p>                            Readers can now explore your thoughts and ideas. Keep writing and growing your voice.                        </p>                        <!-- Button -->                        <div style="text-align:center; margin:25px 0;">                            <a th:href="${blogUrl}"                               style="background:#2e7d32; color:white; text-decoration:none;                        padding:12px 24px; border-radius:6px; font-size:14px;">                                View Your Blog                            </a>                        </div>                        <p style="margin-top:25px;">                            — Team VerdantVoices                        </p>                    </td>                </tr>                <!-- Footer -->                <tr>                    <td style="background:#f1f1f1; padding:12px; text-align:center; font-size:12px; color:#777;">                        Keep sharing knowledge and inspiring minds.                    </td>                </tr>            </table>        </td>    </tr></table></body></html>
