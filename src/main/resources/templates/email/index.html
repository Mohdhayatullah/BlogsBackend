<!DOCTYPE html><html xmlns:th="http://www.thymeleaf.org"><head>    <title>Welcome</title></head><body style="margin:0; padding:0; background-color:#f4f6f8; font-family:Arial, sans-serif;"><table width="100%" cellpadding="0" cellspacing="0" style="background-color:#f4f6f8; padding:20px;">    <tr>        <td align="center">            <!-- Main Card -->            <table width="600" cellpadding="0" cellspacing="0"                   style="background:#ffffff; border-radius:10px; overflow:hidden; box-shadow:0 4px 10px rgba(0,0,0,0.08);">                <!-- Header -->                <tr>                    <td style="background:linear-gradient(135deg,#2e7d32,#66bb6a); padding:25px; text-align:center; color:white;">                        <h2 style="margin:0;">VerdantVoices 🌱</h2>                        <p style="margin:5px 0 0; font-size:14px;">Grow ideas. Inspire minds.</p>                    </td>                </tr>                <!-- Content -->                <tr>                    <td style="padding:30px; color:#333; line-height:1.6;">                        <p style="font-size:16px;">                            Hello <b th:text="${name}" style="color:#2e7d32;"></b>,                        </p>                        <p>                            A community of thinkers, writers and explorers. Share ideas, inspire minds,                            and grow together in a lush garden of knowledge.                        </p>                        <p>                            We’re glad to have you onboard.                        </p>                        <!-- Button -->                        <div style="text-align:center; margin:30px 0;">                            <a href="#"                               style="background:#2e7d32; color:white; text-decoration:none;                                      padding:12px 25px; border-radius:6px; font-size:14px; display:inline-block;">                                Start Exploring                            </a>                        </div>                        <p style="margin-top:30px;">                            — Team VerdantVoices                        </p>                    </td>                </tr>                <!-- Footer -->                <tr>                    <td style="background:#f1f1f1; padding:15px; text-align:center; font-size:12px; color:#777;">                        © 2026 VerdantVoices. All rights reserved.                    </td>                </tr>            </table>        </td>    </tr></table></body></html>
